name: Generate Pacman

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: alrzkyy
          outputs: |
            dist/pacman-contribution.svg?color_snake=yellow&color_dot_empty=#161b22&color_dot_filled_1=#4a1d96&color_dot_filled_2=#7c3aed&color_dot_filled_3=#a855f7&color_dot_filled_4=#c084fc&color_fruit=#f472b6&outputs_type=pacman

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
